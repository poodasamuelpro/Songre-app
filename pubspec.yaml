name: songre
description: Application de don de sang anonyme au Burkina Faso — SONGRE
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: 6.1.5+1

  # Storage local
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP
  http: 1.5.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # UUID
  uuid: ^4.3.3

  # Intl (dates)
  intl: ^0.19.0

  # Google Fonts (Archivo + Inter)
  google_fonts: ^6.2.1

  # Icônes
  cupertino_icons: ^1.0.8

  # Stockage sécurisé (session token — C5)
  flutter_secure_storage: ^9.2.2

  # Chiffrement AES-256 (données de santé — C4)
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
